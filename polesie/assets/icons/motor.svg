<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="motorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007AFF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007AFF"/>
    </marker>
  </defs>
  
  <!-- Motor housing (outer circle) -->
  <circle cx="50" cy="50" r="45" fill="url(#motorGradient)" filter="url(#shadow)" stroke="#0056B3" stroke-width="2"/>
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.8"/>
  
  <!-- Center shaft -->
  <circle cx="50" cy="50" r="12" fill="#FFFFFF" stroke="#0056B3" stroke-width="2"/>
  
  <!-- Cooling fins (radial lines) -->
  <line x1="50" y1="15" x2="50" y2="25" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="75" x2="50" y2="85" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="15" y1="50" x2="25" y2="50" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="75" y1="50" x2="85" y2="50" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="24.6" y1="24.6" x2="31.7" y2="31.7" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="68.3" y1="68.3" x2="75.4" y2="75.4" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="75.4" y1="24.6" x2="68.3" y2="31.7" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <line x1="31.7" y1="68.3" x2="24.6" y2="75.4" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Rotation indicator arrow -->
  <path d="M 50 38 A 12 12 0 0 1 62 50" fill="none" stroke="#007AFF" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  
  <!-- Lightning bolt (power symbol) -->
  <path d="M 55 45 L 48 58 L 53 58 L 46 70 L 58 55 L 52 55 Z" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
</svg>
